<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IureCo — Panel de Expedientes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1A2744; --navy2:#243460; --gold:#C8A84B; --gold-l:#F0E0A0;
    --bg:#F4F3EF; --white:#FFFFFF; --muted:#6B6B5E; --border:#E2DED4;
    --green:#25D366; --green2:#27AE60; --red:#C0392B; --amber:#E67E22;
    --blue:#2980B9; --teal:#16A085; --gray:#95A5A6;
  }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--navy); min-height:100vh; }

  header { background:var(--navy); padding:0 1.5rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { color:#fff; font-weight:700; font-size:1rem; letter-spacing:0.1em; text-transform:uppercase; }
  .logo span { color:var(--gold); }
  .header-right { display:flex; align-items:center; gap:0.75rem; }
  #search-input { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:0.4rem 0.75rem; color:#fff; font-family:'Inter',sans-serif; font-size:0.82rem; width:200px; outline:none; }
  #search-input::placeholder { color:rgba(255,255,255,0.5); }
  #search-input:focus { border-color:var(--gold); }
  .btn-refresh { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; padding:0.4rem 0.75rem; font-size:0.8rem; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-refresh:hover { background:rgba(255,255,255,0.2); }

  .main { display:flex; height:calc(100vh - 56px); }
  .sidebar { width:320px; min-width:280px; background:var(--white); border-right:1px solid var(--border); overflow-y:auto; flex-shrink:0; }
  .sidebar-header { padding:1rem; border-bottom:1px solid var(--border); font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; display:flex; justify-content:space-between; align-items:center; }
  #total-badge { background:var(--navy); color:#fff; border-radius:12px; padding:0.1rem 0.5rem; font-size:0.72rem; }

  .exp-item { padding:0.875rem 1rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; display:flex; align-items:center; gap:0.75rem; }
  .exp-item:hover { background:#F9F8F5; }
  .exp-item.active { background:#EEF1F8; border-left:3px solid var(--navy); }
  .exp-avatar { width:36px; height:36px; border-radius:50%; background:var(--navy); color:var(--gold-l); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
  .exp-info { flex:1; min-width:0; }
  .exp-nombre { font-weight:600; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .exp-ticket { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--muted); }

  .detail { flex:1; overflow-y:auto; padding:1.5rem; }
  .detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--muted); gap:0.5rem; }
  .detail-empty svg { opacity:0.3; }

  .detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
  .detail-title { font-size:1.25rem; font-weight:700; }
  .detail-ticket { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--muted); margin-top:0.2rem; }
  .detail-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:0.5rem 1rem; border-radius:8px; font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; border:none; transition:opacity 0.15s; text-decoration:none; }
  .btn:active { opacity:0.8; }
  .btn-wa    { background:var(--green); color:#fff; }
  .btn-navy  { background:var(--navy); color:#fff; }
  .btn-outline { background:none; border:1px solid var(--border); color:var(--navy); }
  .btn-red   { background:var(--red); color:#fff; }
  .btn-gold  { background:var(--gold); color:var(--navy); font-weight:700; }
  .btn-green { background:var(--green2); color:#fff; }
  .btn-sm    { padding:0.3rem 0.65rem; font-size:0.78rem; }

  .cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .cards-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1rem; }
  @media(max-width:700px) { .cards-grid,.cards-grid-3 { grid-template-columns:1fr; } }

  .card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:0; }
  .card-full { grid-column:1/-1; }
  .card-title { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:1rem; }

  .status-badge { display:inline-flex; align-items:center; gap:5px; padding:0.25rem 0.65rem; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .status-dot { width:7px; height:7px; border-radius:50%; }
  .status-select { width:100%; padding:0.5rem; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:0.85rem; color:var(--navy); background:var(--white); margin-top:0.5rem; cursor:pointer; }

  /* Pagos */
  .pago-toggle { display:flex; align-items:center; justify-content:space-between; padding:0.6rem 0; border-bottom:1px solid var(--border); }
  .pago-toggle:last-of-type { border-bottom:none; }
  .pago-label { font-size:0.88rem; font-weight:500; }
  .pago-badge { padding:0.25rem 0.65rem; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .pago-si  { background:#D4EDDA; color:#155724; }
  .pago-no  { background:#FFF3CD; color:#856404; }
  .pago-monto { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--navy); }

  .pagos-list { list-style:none; margin-top:0.75rem; }
  .pago-item { display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.83rem; }
  .pago-item:last-child { border-bottom:none; }

  /* Input row */
  .input-row { display:flex; gap:0.5rem; margin-top:0.75rem; flex-wrap:wrap; }
  .inp { flex:1; min-width:100px; padding:0.5rem 0.75rem; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:0.85rem; color:var(--navy); }
  .inp:focus { outline:none; border-color:var(--navy); }
  .inp-sm { padding:0.4rem 0.6rem; font-size:0.82rem; }
  select.inp { cursor:pointer; }

  /* Resumen financiero */
  .fin-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.75rem; margin-bottom:1rem; }
  .fin-card { background:var(--bg); border-radius:8px; padding:0.75rem 1rem; }
  .fin-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.25rem; }
  .fin-value { font-family:'JetBrains Mono',monospace; font-size:1.1rem; font-weight:700; }
  .fin-pos { color:var(--green2); }
  .fin-neg { color:var(--red); }
  .fin-neu { color:var(--navy); }

  /* Gastos */
  .gastos-list { list-style:none; margin-top:0.5rem; }
  .gasto-item { display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.83rem; }
  .gasto-item:last-child { border-bottom:none; }

  /* Pasos */
  .pasos-list { list-style:none; }
  .paso-item { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .paso-item:last-child { border-bottom:none; }
  .paso-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:700; flex-shrink:0; }
  .paso-num.done { background:var(--teal); color:#fff; }
  .paso-num.curr { background:var(--navy); color:var(--gold-l); }
  .paso-num.pend { background:var(--border); color:var(--muted); }
  .paso-label { font-size:0.88rem; flex:1; }
  .paso-label.done { text-decoration:line-through; color:var(--muted); }
  .paso-label.curr { font-weight:600; }

  /* Requisitos */
  .req-list { list-style:none; }
  .req-item { display:flex; align-items:center; gap:0.6rem; padding:0.45rem 0; font-size:0.85rem; border-bottom:1px solid var(--border); }
  .req-item:last-child { border-bottom:none; }
  .req-check { width:16px; height:16px; cursor:pointer; accent-color:var(--red); flex-shrink:0; }
  .req-label.falta { color:var(--red); font-weight:500; }

  .notas-area { width:100%; min-height:80px; padding:0.75rem; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:0.85rem; color:var(--navy); resize:vertical; margin-top:0.5rem; }
  .notas-area:focus { outline:none; border-color:var(--navy); }

  /* Anticipo en operación banner */
  .op-banner { background:#D4EDDA; border:1px solid #C3E6CB; border-radius:8px; padding:0.65rem 1rem; display:flex; align-items:center; gap:0.6rem; font-size:0.85rem; font-weight:600; color:#155724; margin-bottom:1rem; }

  .loading { text-align:center; padding:3rem; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:0.6rem 1.25rem; border-radius:8px; font-size:0.85rem; font-weight:500; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
  #toast.show { opacity:1; }

  .section-gap { margin-bottom:1rem; }
</style>
</head>
<body>

<header>
  <div class="logo">Iure<span>Co</span> <span style="color:rgba(255,255,255,0.4);font-weight:400;font-size:0.8rem;margin-left:0.5rem;">Expedientes</span></div>
  <div class="header-right">
    <input type="text" id="search-input" placeholder="Buscar cliente o ticket…" oninput="filtrarExpedientes()">
    <button class="btn-refresh" onclick="cargarExpedientes()">↺ Actualizar</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Expedientes <span id="total-badge">0</span></div>
    <div id="lista-expedientes"><div class="loading"><div class="spinner"></div>Cargando…</div></div>
  </div>
  <div class="detail" id="detail-panel">
    <div class="detail-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Selecciona un expediente</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwYL2KycrqC8OiW_9Tkqc8RtwN2tQHLtsc2hRufnPkcNpe8XMY7hMf7ucFvJ8YHec_n/exec';

const PASOS = [
  'Redacción de borrador de escritura',
  'Impresión y firma de escritura pública',
  'Preparación de documentación',
  'Subida a Registro Mercantil',
  'Seguimiento del proceso',
  'Descarga de patentes',
  'Entrega de documentación'
];

const REQUISITOS = [
  'Tres nombres tentativos de la sociedad',
  'Nombre tentativo empresa mercantil',
  'Copia DPI accionistas',
  'Profesión u oficio de cada accionista',
  'Copia DPI representante legal',
  'Distribución de acciones (%)',
  'Objeto de la sociedad',
  'Copia recibo agua o luz',
  'Nombre y NIT del Contador',
  'Régimen tributario',
  'Capital social a autorizar (Q)',
  'Capital suscrito y pagado (Q)',
  'Boleta de anticipo'
];

const TIPOS_GASTO = [
  'Honorarios IureCo',
  'Timbres fiscales',
  'Papel protocolo',
  'Gastos de registro',
  'Arancel de inscripción',
  'Patente de comercio',
  'Otro'
];

const STATUS_COLORS = {
  'Pendiente revisión':     { bg:'#FFF3CD', color:'#856404', dot:'#F0AD4E' },
  'Corrección solicitada':  { bg:'#F8D7DA', color:'#721C24', dot:'#C0392B' },
  'Documentación completa': { bg:'#D4EDDA', color:'#155724', dot:'#27AE60' },
  'Expediente en operación':{ bg:'#D1F2E1', color:'#0B5A2E', dot:'#16A085' },
  'En trámite':             { bg:'#D1ECF1', color:'#0C5460', dot:'#2980B9' },
  'Entregado':              { bg:'#E2E3E5', color:'#383D41', dot:'#95A5A6' },
};

let expedientes = [];
let ticketActivo = null;

async function api(action, body = {}) {
  const params = new URLSearchParams({ action });
  Object.keys(body).forEach(k => {
    params.set(k, typeof body[k] === 'object' ? JSON.stringify(body[k]) : body[k]);
  });
  const res = await fetch(`${WEBAPP_URL}?${params.toString()}`, { method:'GET', redirect:'follow' });
  return res.json();
}

async function cargarExpedientes() {
  document.getElementById('lista-expedientes').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando…</div>';
  try {
    const data = await api('getExpedientes');
    expedientes = data.expedientes || [];
    renderLista(expedientes);
  } catch(e) {
    document.getElementById('lista-expedientes').innerHTML = '<div class="loading">⚠️ No se pudo conectar.</div>';
  }
}

function renderLista(lista) {
  const el = document.getElementById('lista-expedientes');
  document.getElementById('total-badge').textContent = lista.length;
  if (!lista.length) { el.innerHTML = '<div class="loading">Sin expedientes</div>'; return; }
  el.innerHTML = lista.map(e => {
    const inicial = (e['Cliente'] || '?')[0].toUpperCase();
    const estatus = e['Estatus'] || 'Pendiente revisión';
    const sc = STATUS_COLORS[estatus] || STATUS_COLORS['Pendiente revisión'];
    return `<div class="exp-item ${e['Ticket']===ticketActivo?'active':''}" onclick="abrirExpediente('${e['Ticket']}')">
      <div class="exp-avatar">${inicial}</div>
      <div class="exp-info">
        <div class="exp-nombre">${e['Cliente']||'Sin nombre'}</div>
        <div class="exp-ticket">${e['Ticket']} · ${e['Fecha Ingreso']||''}</div>
      </div>
      <span class="status-badge" style="background:${sc.bg};color:${sc.color};font-size:0.68rem">
        <span class="status-dot" style="background:${sc.dot}"></span>${estatus}
      </span>
    </div>`;
  }).join('');
}

function filtrarExpedientes() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderLista(expedientes.filter(e => (e['Cliente']||'').toLowerCase().includes(q)||(e['Ticket']||'').toLowerCase().includes(q)));
}

async function abrirExpediente(ticket) {
  ticketActivo = ticket;
  filtrarExpedientes();
  document.getElementById('detail-panel').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando…</div>';
  const [expData, finData] = await Promise.all([
    api('getExpediente', { ticket }),
    api('getResumenFinanciero', { ticket })
  ]);
  if (expData.error) { toast('Error: ' + expData.error); return; }
  renderDetalle(expData.expediente, finData);
}

function renderDetalle(exp, fin) {
  const ticket   = exp['Ticket'];
  const nombre   = exp['Cliente'] || 'Sin nombre';
  const wa       = exp['WhatsApp'] || '';
  const estatus  = exp['Estatus'] || 'Pendiente revisión';
  const pasoAct  = exp['Paso Actual'] || '';
  const notas    = exp['Notas'] || '';
  const anticipo = exp['Anticipo Confirmado'] === 'Sí' || exp['Anticipo Confirmado'] === true;
  const entrega  = exp['Entrega Confirmada'] === 'Sí' || exp['Entrega Confirmada'] === true;
  const linkForm = exp['Link Form Corrección'] || '';
  const sc = STATUS_COLORS[estatus] || STATUS_COLORS['Pendiente revisión'];
  const pasoIdx  = PASOS.indexOf(pasoAct);
  const faltantes = REQUISITOS.filter(r => exp['FALTA: '+r]===true||exp['FALTA: '+r]==='TRUE');

  const pagos  = fin.pagos  || [];
  const gastos = fin.gastos || [];
  const gananciaCls = fin.gananciaNeta > 0 ? 'fin-pos' : fin.gananciaNeta < 0 ? 'fin-neg' : 'fin-neu';

  document.getElementById('detail-panel').innerHTML = `
    <!-- HEADER -->
    <div class="detail-header">
      <div>
        <div class="detail-title">${nombre}</div>
        <div class="detail-ticket">${ticket} · ${exp['Fecha Ingreso']||'—'}</div>
      </div>
      <div class="detail-actions">
        ${wa
          ? `<a class="btn btn-wa" href="https://wa.me/${wa}" target="_blank">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
              WhatsApp
            </a>`
          : `<button class="btn btn-outline" onclick="mostrarInputWA()">+ WhatsApp</button>`
        }
        <button class="btn btn-navy" onclick="guardarNotas('${ticket}')">Guardar notas</button>
      </div>
    </div>

    <!-- BANNER OPERACIÓN -->
    ${anticipo ? `<div class="op-banner">✅ Expediente en operación — Anticipo confirmado</div>` : ''}

    <!-- WA INPUT -->
    ${!wa ? `<div class="card section-gap" id="wa-box">
      <div class="card-title">Número WhatsApp del cliente</div>
      <div class="input-row">
        <input class="inp" id="wa-input" placeholder="502XXXXXXXX" type="tel">
        <button class="btn btn-navy" onclick="guardarWA('${ticket}')">Guardar</button>
      </div>
    </div>` : ''}

    <!-- FILA 1: Estatus + Pasos -->
    <div class="cards-grid section-gap">
      <div class="card">
        <div class="card-title">Estatus</div>
        <span class="status-badge" style="background:${sc.bg};color:${sc.color}">
          <span class="status-dot" style="background:${sc.dot}"></span>${estatus}
        </span>
        <select class="status-select" onchange="cambiarEstatus('${ticket}',this.value)">
          <option value="">— Cambiar estatus —</option>
          <option>Pendiente revisión</option>
          <option>Corrección solicitada</option>
          <option>Documentación completa</option>
          <option>Expediente en operación</option>
          <option>En trámite</option>
          <option>Entregado</option>
        </select>
      </div>
      <div class="card">
        <div class="card-title">Pasos del trámite</div>
        <ul class="pasos-list">
          ${PASOS.map((p,i) => {
            const estado = i<pasoIdx?'done':i===pasoIdx?'curr':'pend';
            return `<li class="paso-item" onclick="avanzarPaso('${ticket}',${i})">
              <div class="paso-num ${estado}">${i<pasoIdx?'✓':i+1}</div>
              <div class="paso-label ${estado}">${p}</div>
              ${i===pasoIdx?'<span style="font-size:0.68rem;color:var(--navy);font-weight:600">◀</span>':''}
            </li>`;
          }).join('')}
        </ul>
      </div>
    </div>

    <!-- FILA 2: Pagos -->
    <div class="card section-gap">
      <div class="card-title">Pagos</div>

      <!-- Anticipo -->
      <div class="pago-toggle">
        <div>
          <div class="pago-label">Anticipo</div>
          <div style="font-size:0.78rem;color:var(--muted)">Total: <span class="pago-monto">Q ${(fin.totalAnticipo||0).toFixed(2)}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="pago-badge ${anticipo?'pago-si':'pago-no'}">${anticipo?'✓ Confirmado':'Pendiente'}</span>
          ${!anticipo ? `<button class="btn btn-green btn-sm" onclick="mostrarFormAnticipo('${ticket}')">+ Registrar</button>` : `<button class="btn btn-outline btn-sm" onclick="mostrarFormAnticipo('${ticket}')">+ Agregar pago</button>`}
        </div>
      </div>
      <div id="form-anticipo-${ticket}" style="display:none" class="input-row">
        <input class="inp inp-sm" id="monto-anticipo-${ticket}" placeholder="Monto Q" type="number" min="0" step="0.01">
        <button class="btn btn-green btn-sm" onclick="registrarAnticipo('${ticket}')">Guardar</button>
      </div>

      <!-- Historial anticipos -->
      ${pagos.filter(p=>p['Tipo']==='Anticipo').length ? `
      <ul class="pagos-list">
        ${pagos.filter(p=>p['Tipo']==='Anticipo').map(p=>`
        <li class="pago-item">
          <span>${p['Fecha']}</span>
          <span class="pago-monto">Q ${parseFloat(p['Monto (Q)']).toFixed(2)}</span>
        </li>`).join('')}
      </ul>` : ''}

      <div style="border-top:1px solid var(--border);margin:0.75rem 0"></div>

      <!-- Contra entrega -->
      <div class="pago-toggle">
        <div>
          <div class="pago-label">Pago contra entrega</div>
          <div style="font-size:0.78rem;color:var(--muted)">Total: <span class="pago-monto">Q ${(fin.totalEntrega||0).toFixed(2)}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="pago-badge ${entrega?'pago-si':'pago-no'}">${entrega?'✓ Confirmado':'Pendiente'}</span>
          ${!entrega ? `<button class="btn btn-gold btn-sm" onclick="mostrarFormEntrega('${ticket}')">Confirmar</button>` : ''}
        </div>
      </div>
      <div id="form-entrega-${ticket}" style="display:none" class="input-row">
        <input class="inp inp-sm" id="monto-entrega-${ticket}" placeholder="Monto Q" type="number" min="0" step="0.01">
        <button class="btn btn-gold btn-sm" onclick="registrarEntrega('${ticket}')">Confirmar pago → Cerrar expediente</button>
      </div>
    </div>

    <!-- FILA 3: Resumen financiero -->
    <div class="card section-gap">
      <div class="card-title">Resumen financiero</div>
      <div class="fin-grid">
        <div class="fin-card">
          <div class="fin-label">Total ingresos</div>
          <div class="fin-value fin-pos">Q ${(fin.totalIngresos||0).toFixed(2)}</div>
        </div>
        <div class="fin-card">
          <div class="fin-label">Total gastos</div>
          <div class="fin-value fin-neg">Q ${(fin.totalGastos||0).toFixed(2)}</div>
        </div>
        <div class="fin-card" style="grid-column:1/-1;background:${(fin.gananciaNeta||0)>=0?'#D4EDDA':'#F8D7DA'}">
          <div class="fin-label">Ganancia neta</div>
          <div class="fin-value ${gananciaCls}">Q ${(fin.gananciaNeta||0).toFixed(2)}</div>
        </div>
      </div>
      <button class="btn btn-outline" style="font-size:0.8rem" onclick="exportarXLS('${ticket}')">
        ⬇ Exportar XLS para contador
      </button>
    </div>

    <!-- FILA 4: Gastos -->
    <div class="card section-gap">
      <div class="card-title">Gastos del expediente</div>
      <div class="input-row">
        <select class="inp inp-sm" id="tipo-gasto-${ticket}">
          ${TIPOS_GASTO.map(t=>`<option>${t}</option>`).join('')}
        </select>
        <input class="inp inp-sm" id="monto-gasto-${ticket}" placeholder="Monto Q" type="number" min="0" step="0.01" style="max-width:120px">
        <button class="btn btn-navy btn-sm" onclick="agregarGasto('${ticket}')">+ Agregar</button>
      </div>
      ${gastos.length ? `
      <ul class="gastos-list" style="margin-top:0.75rem">
        ${gastos.map(g=>`
        <li class="gasto-item">
          <span>${g['Descripción']} <span style="color:var(--muted);font-size:0.75rem">${g['Fecha']}</span></span>
          <span class="pago-monto">Q ${parseFloat(g['Monto (Q)']).toFixed(2)}</span>
        </li>`).join('')}
      </ul>` : `<p style="font-size:0.82rem;color:var(--muted);margin-top:0.75rem">Sin gastos registrados</p>`}
    </div>

    <!-- FILA 5: Documentos faltantes -->
    <div class="card section-gap">
      <div class="card-title">Documentos — marcar faltantes</div>
      <ul class="req-list" id="req-list-${ticket}">
        ${REQUISITOS.map(r => {
          const falta = faltantes.includes(r);
          return `<li class="req-item">
            <input type="checkbox" class="req-check" ${falta?'checked':''}>
            <span class="req-label ${falta?'falta':''}">${r}</span>
          </li>`;
        }).join('')}
      </ul>
      <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap">
        <button class="btn btn-red" onclick="generarFormCorreccion('${ticket}')">Generar form de corrección</button>
        ${linkForm ? `<a class="btn btn-outline" href="${linkForm}" target="_blank">Ver form generado</a>` : ''}
      </div>
    </div>

    <!-- FILA 6: Notas -->
    <div class="card">
      <div class="card-title">Notas internas</div>
      <textarea class="notas-area" id="notas-${ticket}" placeholder="Anotaciones internas…">${notas}</textarea>
    </div>
  `;
}

// ── ACCIONES ──────────────────────────────────────────────────
async function cambiarEstatus(ticket, estatus) {
  if (!estatus) return;
  await api('updateEstatus', { ticket, estatus });
  toast('Estatus actualizado');
  await cargarExpedientes();
  abrirExpediente(ticket);
}

async function avanzarPaso(ticket, idx) {
  await api('updatePaso', { ticket, paso: PASOS[idx] });
  toast('Paso: ' + PASOS[idx]);
  abrirExpediente(ticket);
}

async function guardarNotas(ticket) {
  const notas = document.getElementById('notas-'+ticket)?.value || '';
  await api('updateNotas', { ticket, notas });
  toast('Notas guardadas');
}

function mostrarInputWA() {
  const box = document.getElementById('wa-box');
  if (box) { box.style.display='block'; document.getElementById('wa-input')?.focus(); }
}

async function guardarWA(ticket) {
  const num = document.getElementById('wa-input')?.value.trim();
  if (!num) { toast('Ingresa el número'); return; }
  await api('agregarWhatsApp', { ticket, whatsapp: num });
  toast('WhatsApp guardado');
  await cargarExpedientes();
  abrirExpediente(ticket);
}

// Pagos
function mostrarFormAnticipo(ticket) {
  const el = document.getElementById('form-anticipo-'+ticket);
  if (el) { el.style.display = el.style.display==='none'?'flex':'none'; }
}
function mostrarFormEntrega(ticket) {
  const el = document.getElementById('form-entrega-'+ticket);
  if (el) { el.style.display = el.style.display==='none'?'flex':'none'; }
}

async function registrarAnticipo(ticket) {
  const monto = document.getElementById('monto-anticipo-'+ticket)?.value;
  if (!monto || monto <= 0) { toast('Ingresa el monto'); return; }
  await api('agregarPago', { ticket, tipo: 'Anticipo', monto });
  toast('Anticipo registrado');
  await cargarExpedientes();
  abrirExpediente(ticket);
}

async function registrarEntrega(ticket) {
  const monto = document.getElementById('monto-entrega-'+ticket)?.value;
  if (!monto || monto <= 0) { toast('Ingresa el monto'); return; }
  if (!confirm('¿Confirmar pago contra entrega? Esto cerrará el expediente como Entregado.')) return;
  await api('confirmarEntrega', { ticket, monto });
  toast('Pago confirmado — expediente entregado');
  await cargarExpedientes();
  abrirExpediente(ticket);
}

// Gastos
async function agregarGasto(ticket) {
  const descripcion = document.getElementById('tipo-gasto-'+ticket)?.value;
  const monto       = document.getElementById('monto-gasto-'+ticket)?.value;
  if (!monto || monto <= 0) { toast('Ingresa el monto'); return; }
  await api('agregarGasto', { ticket, descripcion, monto });
  toast('Gasto registrado');
  abrirExpediente(ticket);
}

// Exportar XLS
function exportarXLS(ticket) {
  const exp = expedientes.find(e => e['Ticket'] === ticket);
  const nombre = exp ? exp['Cliente'] : ticket;

  api('getResumenFinanciero', { ticket }).then(fin => {
    const pagos  = fin.pagos  || [];
    const gastos = fin.gastos || [];

    let csv = `IURECO — RESUMEN FINANCIERO\n`;
    csv += `Expediente:,${ticket}\n`;
    csv += `Cliente:,${nombre}\n\n`;

    csv += `INGRESOS\n`;
    csv += `Tipo,Monto (Q),Fecha\n`;
    pagos.forEach(p => { csv += `${p['Tipo']},${p['Monto (Q)']},${p['Fecha']}\n`; });
    csv += `TOTAL INGRESOS,${fin.totalIngresos.toFixed(2)}\n\n`;

    csv += `GASTOS\n`;
    csv += `Descripción,Monto (Q),Fecha\n`;
    gastos.forEach(g => { csv += `${g['Descripción']},${g['Monto (Q)']},${g['Fecha']}\n`; });
    csv += `TOTAL GASTOS,${fin.totalGastos.toFixed(2)}\n\n`;

    csv += `GANANCIA NETA,${fin.gananciaNeta.toFixed(2)}\n`;

    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `IureCo_${ticket}_${nombre}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Archivo descargado');
  });
}

// Generar form de corrección
async function generarFormCorreccion(ticket) {
  const checks   = document.querySelectorAll(`#req-list-${ticket} input[type=checkbox]`);
  const faltantes = [];
  checks.forEach((ch, i) => { if (ch.checked) faltantes.push(REQUISITOS[i]); });
  if (!faltantes.length) { toast('No hay documentos marcados'); return; }

  await api('marcarFaltantes', { ticket, faltantes });
  toast('Generando formulario…');
  const res = await api('generarFormCorr', { ticket });
  if (res.error) { toast('Error: ' + res.error); return; }

  toast('✓ Formulario creado');
  const wa  = expedientes.find(e => e['Ticket']===ticket)?.['WhatsApp'];
  const msg = encodeURIComponent(`Hola, para continuar con su trámite (Exp. ${ticket}) necesitamos documentación faltante: ${res.formUrl}`);
  const waUrl = wa ? `https://wa.me/${wa}?text=${msg}` : null;

  const ok = confirm(
    `Formulario creado para ${res.cliente}.\n\nFaltantes:\n${res.faltantes.map(f=>'• '+f).join('\n')}\n\nLink: ${res.formUrl}\n\n${waUrl?'¿Abrir WhatsApp del cliente?':'Agrega el WhatsApp del cliente para enviar directo.'}`
  );
  if (ok && waUrl) window.open(waUrl, '_blank');
  abrirExpediente(ticket);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

cargarExpedientes();
</script>
